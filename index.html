<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thiệp Mời | Luận Đinh & Loan Phượng</title>
  <meta name="description" content="Tạo thiệp mời cưới cá nhân hoá cho Luận Đinh & Loan Phượng." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf6f0; --beige: #f0e6d3; --blush: #f2c4b8;
      --brown: #8b6a5a; --brown-dark: #5c4033;
      --gold: #c9a96e; --gold-light: #e8d5a3;
      --sage: #8fa68e; --text-mid: #6b5244; --text-light: #9e8878;
      --font-display: 'Great Vibes', cursive;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-body: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Lato', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(201,169,110,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(242,196,184,.2) 0%, transparent 55%),
        var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-body); padding: 2rem;
    }

    /* Decorative corner SVG */
    .page-corner {
      position: fixed; width: 200px; opacity: .15; pointer-events: none;
    }
    .page-corner.tl { top: 0; left: 0; }
    .page-corner.br { bottom: 0; right: 0; transform: rotate(180deg); }

    .card {
      background: #fff;
      border: 1px solid var(--gold-light);
      padding: 3.5rem 3rem;
      max-width: 520px; width: 100%;
      text-align: center;
      position: relative;
      box-shadow: 0 8px 60px rgba(92,64,51,.08);
    }
    /* gold top bar */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    /* inner border */
    .card::after {
      content: '';
      position: absolute; inset: 10px;
      border: 1px solid rgba(201,169,110,.2);
      pointer-events: none;
    }

    .card-tag {
      font-family: var(--font-sans); font-size: .65rem;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--sage); margin-bottom: 1rem; display: block;
    }
    .card-title {
      font-family: var(--font-display); font-size: clamp(2.5rem, 8vw, 3.8rem);
      color: var(--brown-dark); line-height: 1.1; margin-bottom: .3rem;
    }
    .card-sub {
      font-family: var(--font-serif); font-size: 1rem; font-style: italic;
      color: var(--text-mid); margin-bottom: .3rem;
    }
    .divider {
      display: flex; align-items: center; gap: .8rem;
      margin: 1.5rem auto; max-width: 200px;
    }
    .divider span { flex: 1; height: 1px; background: var(--gold-light); }
    .divider i { color: var(--gold); }

    .instruction {
      font-family: var(--font-body); font-size: 1.05rem;
      color: var(--text-mid); margin-bottom: 1.8rem; line-height: 1.7;
    }

    /* Tab selector */
    .tab-row {
      display: flex; gap: .5rem; margin-bottom: 1.5rem;
    }
    .tab-btn {
      flex: 1; padding: .6rem;
      border: 1px solid var(--gold-light); background: var(--beige);
      font-family: var(--font-sans); font-size: .7rem;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-mid); cursor: pointer;
      transition: all .25s; border-radius: 2px;
    }
    .tab-btn.active {
      background: var(--brown-dark); border-color: var(--brown-dark);
      color: var(--gold-light);
    }

    .input-wrap { position: relative; margin-bottom: 1rem; }
    .input-wrap input {
      width: 100%; padding: .9rem 1.2rem;
      border: 1px solid var(--gold-light); border-radius: 2px;
      background: var(--beige);
      font-family: var(--font-body); font-size: 1.1rem;
      color: var(--brown-dark); outline: none;
      transition: border-color .25s;
      text-align: center;
    }
    .input-wrap input:focus { border-color: var(--gold); }
    .input-wrap input::placeholder { color: var(--text-light); font-style: italic; }

    .btn-gen {
      width: 100%; padding: 1rem;
      background: var(--brown-dark); color: var(--gold-light);
      border: none; border-radius: 2px;
      font-family: var(--font-sans); font-size: .75rem;
      letter-spacing: .2em; text-transform: uppercase;
      cursor: pointer; transition: background .3s; margin-bottom: 1.5rem;
    }
    .btn-gen:hover { background: var(--brown); }

    /* Result area */
    .result { display: none; }
    .result.show { display: block; }
    .result-label {
      font-family: var(--font-sans); font-size: .65rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--sage); margin-bottom: .5rem;
    }
    .result-link-box {
      background: var(--beige); border: 1px solid var(--gold-light);
      border-radius: 2px; padding: .8rem 1rem;
      font-family: var(--font-sans); font-size: .8rem;
      color: var(--text-mid); word-break: break-all;
      margin-bottom: 1rem; text-align: left;
    }
    .btn-row { display: flex; gap: .6rem; }
    .btn-copy, .btn-open-link {
      flex: 1; padding: .7rem;
      font-family: var(--font-sans); font-size: .7rem;
      letter-spacing: .12em; text-transform: uppercase;
      border-radius: 2px; cursor: pointer; transition: all .25s;
    }
    .btn-copy {
      border: 1px solid var(--gold); background: transparent;
      color: var(--brown-dark);
    }
    .btn-copy:hover { background: var(--gold); color: var(--brown-dark); }
    .btn-open-link {
      border: 1px solid var(--brown-dark); background: var(--brown-dark);
      color: var(--gold-light);
    }
    .btn-open-link:hover { background: var(--brown); }

    .preview-name {
      font-family: var(--font-body); font-style: italic;
      color: var(--text-mid); font-size: .95rem; margin-top: 1rem;
    }
    .preview-name strong {
      font-family: var(--font-serif); color: var(--brown-dark); font-style: normal;
    }

    /* copy toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--brown-dark); color: var(--gold-light);
      font-family: var(--font-sans); font-size: .75rem; letter-spacing: .1em;
      padding: .7rem 1.8rem; border-radius: 2px; opacity: 0;
      transition: opacity .3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.5rem; }
      .btn-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Corner decorations -->
  <svg class="page-corner tl" viewBox="0 0 200 200" fill="none">
    <path d="M10,10 Q80,10 80,80 T160,160" stroke="#c9a96e" stroke-width="1.5" fill="none"/>
    <circle cx="60" cy="35" r="12" fill="none" stroke="#c9a96e" stroke-width="1"/>
    <circle cx="35" cy="65" r="7" fill="none" stroke="#c9a96e" stroke-width="1"/>
    <path d="M45,20 Q55,35 50,55" stroke="#c9a96e" stroke-width=".8" fill="none"/>
  </svg>
  <svg class="page-corner br" viewBox="0 0 200 200" fill="none">
    <path d="M10,10 Q80,10 80,80 T160,160" stroke="#c9a96e" stroke-width="1.5" fill="none"/>
    <circle cx="60" cy="35" r="12" fill="none" stroke="#c9a96e" stroke-width="1"/>
    <circle cx="35" cy="65" r="7" fill="none" stroke="#c9a96e" stroke-width="1"/>
  </svg>

  <div class="card">
    <span class="card-tag">Thiệp Mời Cưới</span>
    <div class="card-title">Luận Đinh <br/> &amp; <br/> Loan Phượng</div>
    <p class="card-sub" style="font-size:.85rem;color:var(--text-light);">11 · 04 · 2026</p>
    <div class="divider"><span></span><i>✦</i><span></span></div>

    <p class="instruction">
      Nhập tên khách mời để tạo đường link thiệp cưới cá nhân hoá.
    </p>

    <!-- Route selector -->
    <div class="tab-row">
      <button class="tab-btn active" id="tab-nhatrai" onclick="selectRoute('nhatrai')">
        🤵 Nhà Trai
      </button>
      <button class="tab-btn" id="tab-nhagai" onclick="selectRoute('nhagai')">
        👰 Nhà Gái
      </button>
    </div>

    <!-- Name input -->
    <div class="input-wrap">
      <input
        type="text"
        id="guest-name"
        placeholder="Ví dụ: Gia đình anh Tuấn"
        autocomplete="off"
        maxlength="80"
      />
    </div>

    <button class="btn-gen" onclick="generateLink()">Tạo Đường Link Thiệp ✦</button>

    <!-- Generated result -->
    <div class="result" id="result-box">
      <p class="result-label">Đường link thiệp mời</p>
      <div class="result-link-box" id="result-url"></div>
      <div class="btn-row">
        <button class="btn-copy" onclick="copyLink()">📋 Sao Chép</button>
        <button class="btn-open-link" onclick="openLink()">Mở Xem Trước →</button>
      </div>
      <p class="preview-name" id="preview-text"></p>
    </div>
  </div>

  <div class="toast" id="toast">✓ Đã sao chép vào clipboard!</div>

  <script>
    let selectedRoute = 'nhatrai';
    let generatedUrl = '';

    function selectRoute(route) {
      selectedRoute = route;
      document.getElementById('tab-nhatrai').classList.toggle('active', route === 'nhatrai');
      document.getElementById('tab-nhagai').classList.toggle('active', route === 'nhagai');
      // Regenerate if name already entered
      const name = document.getElementById('guest-name').value.trim();
      if (name) generateLink();
    }

    function generateLink() {
      const name = document.getElementById('guest-name').value.trim();
      if (!name) {
        document.getElementById('guest-name').focus();
        document.getElementById('guest-name').style.borderColor = '#d4897a';
        setTimeout(() => document.getElementById('guest-name').style.borderColor = '', 1500);
        return;
      }

      // Build URL: same folder, route file
      const base = window.location.href.replace(/\/[^\/]*$/, '/');
      const encoded = encodeURIComponent(name);
      generatedUrl = `${base}${selectedRoute}.html?Ten=${encoded}`;

      document.getElementById('result-url').textContent = generatedUrl;

      const routeLabel = selectedRoute === 'nhatrai' ? 'Nhà Trai' : 'Nhà Gái';
      document.getElementById('preview-text').innerHTML =
        `Khách mời <strong>${name}</strong> sẽ thấy:<br/>
        <em>"Trân trọng kính mời <strong>${name}</strong> cùng người thương<br/>
        đến dự lễ thành hôn của Luận Đinh &amp; Loan Phượng"</em><br/>
        <span style="font-size:.8rem;color:var(--sage);">(${routeLabel})</span>`;

      document.getElementById('result-box').classList.add('show');
    }

    function copyLink() {
      navigator.clipboard.writeText(generatedUrl).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2200);
      });
    }

    function openLink() {
      if (generatedUrl) window.open(generatedUrl, '_blank');
    }

    // Enter key support
    document.getElementById('guest-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generateLink();
    });
  </script>
</body>
</html>
